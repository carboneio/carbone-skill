name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build carbone.skill
        run: cd carbone && zip -r ../carbone.skill . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: carbone.skill
